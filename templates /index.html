<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio - Lista de Socios</title>
    <!-- Enlace a Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4 text-primary">Gestión de Socios del Gimnasio</h1>
        
	<div class="d-flex justify-content-between mb-3">
            <!-- Formulario de Búsqueda Opcional -->
            <form method="GET" action="/" class="d-flex w-50">
                <input class="form-control me-2" type="search" name="q" placeholder="Buscar socio por nombre o apellido..." value="{{ busqueda if busqueda else '' }}">
                <button class="btn btn-primary" type="submit">🔍 Buscar</button>
                {% if busqueda %}
                    <a href="/" class="btn btn-outline-secondary ms-2">Limpiar</a>
                {% endif %}
            </form>
            
            <div>
                <a href="/nuevo" class="btn btn-success">+ Añadir Nuevo Socio</a>
            </div>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Email</th>
                            <th>Plan (ID)</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for socio in socios %}
                        <tr>
                            <td>{{ socio.ID_Socio }}</td>
                            <td>{{ socio.Nombre }}</td>
                            <td>{{ socio.Apellido }}</td>
                            <td>{{ socio.Email }}</td>
                            <td>
                                <span class="badge bg-info text-dark">Plan {{ socio.ID_Plan }}</span>
                            </td>
                            <td class="text-center">
                                <a href="/editar/{{ socio.ID_Socio }}" class="btn btn-sm btn-warning">✏️ Editar</a>
                                <a href="/eliminar/{{ socio.ID_Socio }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás totalmente seguro de eliminar a este socio?');">🗑️ Eliminar</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
