<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h3 class="mb-0">Editar datos del socio</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="/editar/{{ socio.ID_Socio }}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre:</label>
                                <input type="text" name="nombre" class="form-control" value="{{ socio.Nombre }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Apellido:</label>
                                <input type="text" name="apellido" class="form-control" value="{{ socio.Apellido }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email:</label>
                                <input type="email" name="email" class="form-control" value="{{ socio.Email }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Teléfono:</label>
                                <input type="text" name="telefono" class="form-control" value="{{ socio.Telefono }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">ID del Plan:</label>
                                <input type="number" name="id_plan" class="form-control" value="{{ socio.ID_Plan }}" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning">Actualizar Socio</button>
                                <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
